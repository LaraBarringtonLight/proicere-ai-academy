<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Proicere AI Academy</title>
<style>
body{
  font-family:Arial,Helvetica,sans-serif;
  margin:0;
  background:#f4f6f9;
  color:#111;
}
header{
  background:#0a1a3c;
  color:white;
  padding:24px;
}
h1{margin:0}
.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}
.card{
  background:white;
  border-radius:12px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.module{
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:16px;
  overflow:hidden;
}
.module-header{
  padding:18px;
  background:#eef3ff;
  cursor:pointer;
  font-weight:bold;
}
.module-body{
  display:none;
  padding:18px;
}
.module.active .module-body{
  display:block;
}
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  margin-left:10px;
}
.active-badge{
  background:#dff7e6;
  color:#15803d;
}
.upcoming-badge{
  background:#fff3cd;
  color:#8a6d3b;
}
ul{
  padding-left:20px;
}
.quiz-question{
  margin-top:18px;
  padding:12px;
  background:#f8f9fa;
  border-radius:8px;
}
button{
  padding:10px 16px;
  border:none;
  background:#1a6bff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
button:hover{
  background:#0f52d4;
}
iframe{
  width:100%;
  height:420px;
  border:none;
  border-radius:10px;
  margin-top:12px;
}
</style>
</head>
<body>

<header>
<h1>Proicere AI Academy</h1>
<p>Internal AI learning hub</p>
</header>

<div class="container">

<div class="card">
<h2>The Curriculum</h2>
<p>Six modules, one every fortnight.</p>
<div id="modules"></div>
</div>

</div>

<script>
const modulesBase = [
{
n:1,
name:"AI Foundations",
weeks:"Weeks 1–2",
status:"active",
intro:"Understand what AI is, how LLMs work, and how to use them responsibly.",
learns:[
"What generative AI is",
"How LLMs predict text",
"What hallucination means",
"Responsible AI use"
],
lesson:`
<h3>Primary Video</h3>
<iframe src="https://www.youtube.com/embed/LPZh9BOjkQs" allowfullscreen></iframe>
<p>Large language models predict the next most likely word based on patterns in training data.</p>
`,
quiz:[
{
q:"What does an LLM fundamentally do?",
opts:[
"Looks up answers in a database",
"Predicts the next likely word",
"Searches the internet live",
"Thinks like a human"
],
correct:1
}
]
},
{
n:2,
name:"Getting Set Up",
weeks:"Weeks 3–4",
status:"active",
intro:"Create accounts and understand which AI tool to use.",
learns:[
"ChatGPT setup",
"Claude setup",
"Copilot setup",
"When to use each tool"
],
lesson:`
<h3>Getting Started</h3>
<iframe src="https://www.youtube.com/embed/kovgemcH3cI" allowfullscreen></iframe>
<p>Use Copilot for Microsoft 365 tasks, Claude for long docs, ChatGPT for general work.</p>
`,
quiz:[
{
q:"Which tool is part of Microsoft 365?",
opts:["ChatGPT","Claude","Copilot","Gemini"],
correct:2
}
]
},
{
n:3,
name:"Prompting Basics",
weeks:"Weeks 5–6",
status:"upcoming",
intro:"Learn how to write prompts that get useful results.",
learns:[
"Context",
"Role",
"Task",
"Format"
],
lesson:`
<p>Use the structure: Context → Role → Task → Format.</p>
`,
quiz:[
{
q:"What makes prompts stronger?",
opts:[
"Being vague",
"Giving context and format",
"Typing faster",
"Using capitals"
],
correct:1
}
]
},
{
n:4,
name:"AI Inside Microsoft 365",
weeks:"Weeks 7–8",
status:"upcoming",
intro:"Use AI in Word, Excel and PowerPoint.",
learns:[
"PowerPoint decks",
"Excel formulas",
"Word drafting"
],
lesson:`<p>Copilot helps create decks, formulas and drafts.</p>`,
quiz:[]
},
{
n:5,
name:"AI for Documents & Data",
weeks:"Weeks 9–10",
status:"upcoming",
intro:"Summarise reports, compare files and analyse spreadsheets.",
learns:[
"Summaries",
"Comparisons",
"Extraction",
"Spreadsheet Q&A"
],
lesson:`<p>Upload documents and ask structured questions.</p>`,
quiz:[]
},
{
n:6,
name:"Building a Workflow",
weeks:"Weeks 11–12",
status:"upcoming",
intro:"Turn individual wins into repeatable team processes.",
learns:[
"Prompt libraries",
"Projects",
"Custom GPTs",
"When not to use AI"
],
lesson:`<p>Create reusable workflows for the team.</p>`,
quiz:[]
}
];

function renderModules(){
const wrap = document.getElementById("modules");

wrap.innerHTML = modulesBase.map(mod => `
<div class="module">
<div class="module-header" onclick="toggleModule(this)">
Module ${mod.n}: ${mod.name}
<span class="badge ${mod.status === 'active' ? 'active-badge' : 'upcoming-badge'}">
${mod.status}
</span>
</div>

<div class="module-body">
<p><strong>${mod.weeks}</strong></p>
<p>${mod.intro}</p>

<h4>You’ll Learn</h4>
<ul>
${mod.learns.map(i => `<li>${i}</li>`).join("")}
</ul>

<div>${mod.lesson}</div>

${mod.quiz.length ? `
<h4>Quiz</h4>
${mod.quiz.map(q => `
<div class="quiz-question">
<p><strong>${q.q}</strong></p>
${q.opts.map((opt,i)=>`
<div>
<label>
<input type="radio" name="q${mod.n}" value="${i}">
${opt}
</label>
</div>
`).join("")}
</div>
`).join("")}
` : ""}
</div>
</div>
`).join("");
}

function toggleModule(el){
el.parentElement.classList.toggle("active");
}

renderModules();
</script>

</body>
</html>
